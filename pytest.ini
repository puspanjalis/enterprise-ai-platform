[pytest]
# Pytest configuration for Enterprise AI Platform

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test component interactions)
    slow: Slow-running tests (performance, large datasets)
    smoke: Smoke tests (quick sanity checks)
    e2e: End-to-end tests (complete pipeline)

# Output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options (when using --cov)
[coverage:run]
source = pipeline, monitoring, agents
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

precision = 2
show_missing = True

[coverage:html]
directory = htmlcov
