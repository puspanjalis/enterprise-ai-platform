name: ci
on:
  push:
    paths: ['production-rag-assistant/**']
  pull_request:
    paths: ['production-rag-assistant/**']
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: production-rag-assistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest -q
